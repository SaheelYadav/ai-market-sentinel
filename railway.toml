[build]
builder = "dockerfile"

[deploy]
startCommand = "docker-compose up --build"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[services]]
name = "backend"
source = "backend"
[services.config]
nixpacks_plan = "buildpack"

[[services]]
name = "frontend"
source = "frontend"
[services.config]
nixpacks_plan = "buildpack"

[env]
PORT = "5000"
NODE_ENV = "production"
