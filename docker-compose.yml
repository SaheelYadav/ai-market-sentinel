services:
  backend:
    build: ./backend
    container_name: market-analyzer-backend
    env_file:
      - .env
    ports:
      - "5000:5000"
    volumes:
      - ./.env:/app/.env
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: market-analyzer-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
