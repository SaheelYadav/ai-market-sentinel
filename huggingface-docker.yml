version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "7860:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stock/AAPL"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
